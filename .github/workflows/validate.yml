name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install html-validate
        run: npm install --save-dev html-validate

      - name: Validate HTML
        run: npx html-validate game.htm
